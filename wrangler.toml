# Cloudflare Pages + R2 config for HIT IT Mind Diet
name = "hitit-mind-diet"
compatibility_date = "2024-01-01"

# R2 bucket binding — create bucket in Cloudflare dashboard first
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "hitit-media"

# Set this in Cloudflare Pages > Settings > Environment Variables
# R2_PUBLIC_URL = https://media.yourdomain.com  (or the r2.dev subdomain)
